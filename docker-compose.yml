version: '3.8'

services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - APP_USER=user
      - APP_PASSWORD=password
    depends_on:
      - ollama
    networks:
      - cognivex-network

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    command: serve
    networks:
      - cognivex-network

volumes:
  ollama-data:

networks:
  cognivex-network:
    driver: bridge