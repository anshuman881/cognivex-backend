spring:
  main:
    web-application-type: reactive
  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: qwen3:8b
          temperature: 0.7
      embedding:
        options:
          model: nomic-embed-text

logging:
  level:
    org:
      springframework:
        ai: INFO
        web:
          client:
            RestClient: INFO
        security: DEBUG
    com.cognivex.ai: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized