spring:
  main:
    web-application-type: reactive
  ai:
    huggingface:
      chat:
        enabled: false
      embedding:
        enabled: false
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        enabled: true
        options:
          model: ${OLLAMA_CHAT_MODEL:qwen3.5:0.8b}
          temperature: 0.7
      embedding:
        enabled: true
        options:
          model: ${OLLAMA_EMBEDDING_MODEL:nomic-embed-text}

logging:
  level:
    org:
      springframework:
        ai: INFO
        web:
          client:
            RestClient: INFO
        security: DEBUG
    com.cognivex.ai: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized