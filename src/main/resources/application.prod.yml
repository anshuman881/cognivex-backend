spring:
  main:
    web-application-type: reactive
  ai:
    ollama:
      chat:
        enabled: false
      embedding:
        enabled: false
    huggingface:
      chat:
        enabled: true
        api-key: ${HUGGINGFACE_API_KEY}
        options:
          model: ${HUGGINGFACE_MODEL:mistralai/Mistral-7B-Instruct-v0.1}
          temperature: 0.7
      embedding:
        enabled: true
        api-key: ${HUGGINGFACE_API_KEY}
        options:
          model: ${HUGGINGFACE_EMBEDDING_MODEL:sentence-transformers/all-MiniLM-L6-v2}

logging:
  level:
    org:
      springframework:
        ai: INFO
        web:
          client:
            RestClient: INFO
        security: DEBUG
    com.cognivex.ai: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized