<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cognivex Metrics Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #e0e0e0;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 1px solid #333;
            margin-bottom: 30px;
        }
        
        h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
        }
        
        .status.connected {
            background: rgba(0, 255, 136, 0.1);
            color: #00ff88;
        }
        
        .status.disconnected {
            background: rgba(255, 68, 68, 0.1);
            color: #ff4444;
        }
        
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        .status.connected .status-dot {
            background: #00ff88;
        }
        
        .status.disconnected .status-dot {
            background: #ff4444;
            animation: none;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #00d9ff;
        }
        
        .metric {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .metric:last-child {
            border-bottom: none;
        }
        
        .metric-label {
            color: #888;
            font-size: 0.9rem;
        }
        
        .metric-value {
            font-weight: 600;
            font-family: 'Courier New', monospace;
        }
        
        .memory-bar {
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 8px;
        }
        
        .memory-bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s ease;
        }
        
        .memory-bar-fill.heap {
            background: linear-gradient(90deg, #00d9ff, #00ff88);
        }
        
        .thread-count {
            font-size: 3rem;
            font-weight: 700;
            text-align: center;
            color: #00ff88;
        }
        
        .thread-label {
            text-align: center;
            color: #888;
            margin-top: 8px;
        }
        
        .uptime {
            font-family: 'Courier New', monospace;
            font-size: 1.5rem;
            color: #ffd700;
        }
        
        .timestamp {
            color: #888;
            font-size: 0.85rem;
            margin-top: 10px;
        }
        
        .loading {
            text-align: center;
            padding: 60px;
            color: #888;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(0, 217, 255, 0.1);
            border-top-color: #00d9ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        function formatBytes(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }
        
        function formatUptime(millis) {
            const seconds = Math.floor(millis / 1000);
            const minutes = Math.floor(seconds / 60);
            const hours = Math.floor(minutes / 60);
            const days = Math.floor(hours / 24);
            
            if (days > 0) return `${days}d ${hours % 24}h`;
            if (hours > 0) return `${hours}h ${minutes % 60}m`;
            if (minutes > 0) return `${minutes}m ${seconds % 60}s`;
            return `${seconds}s`;
        }
        
        function MemoryCard({ memory }) {
            if (!memory) return <div className="card">Loading...</div>;
            
            const heapUsedPercent = memory.heapMax > 0 ? (memory.heapUsed / memory.heapMax * 100) : 0;
            
            return (
                <div className="card">
                    <div className="card-header">
                        <span className="card-title">🧠 Memory</span>
                    </div>
                    <div className="metric">
                        <span className="metric-label">Heap Used</span>
                        <span className="metric-value">{formatBytes(memory.heapUsed)}</span>
                    </div>
                    <div className="metric">
                        <span className="metric-label">Heap Max</span>
                        <span className="metric-value">{formatBytes(memory.heapMax)}</span>
                    </div>
                    <div className="metric">
                        <span className="metric-label">Heap Committed</span>
                        <span className="metric-value">{formatBytes(memory.heapCommitted)}</span>
                    </div>
                    <div className="metric">
                        <span className="metric-label">Non-Heap Used</span>
                        <span className="metric-value">{formatBytes(memory.nonHeapUsed)}</span>
                    </div>
                    <div className="memory-bar">
                        <div 
                            className="memory-bar-fill heap" 
                            style={{ width: `${heapUsedPercent}%` }}
                        ></div>
                    </div>
                    <div style={{ textAlign: 'center', marginTop: '8px', fontSize: '0.85rem', color: '#888' }}>
                        {heapUsedPercent.toFixed(1)}% used
                    </div>
                </div>
            );
        }
        
        function ThreadCard({ threads }) {
            if (!threads) return <div className="card">Loading...</div>;
            
            return (
                <div className="card">
                    <div className="card-header">
                        <span className="card-title">🧵 Threads</span>
                    </div>
                    <div className="thread-count">{threads.count}</div>
                    <div className="thread-label">Active Threads</div>
                    <div className="metric" style={{ marginTop: '20px' }}>
                        <span className="metric-label">Peak</span>
                        <span className="metric-value">{threads.peak}</span>
                    </div>
                    <div className="metric">
                        <span className="metric-label">Daemon</span>
                        <span className="metric-value">{threads.daemon}</span>
                    </div>
                    <div className="metric">
                        <span className="metric-label">Total Started</span>
                        <span className="metric-value">{threads.totalStarted}</span>
                    </div>
                </div>
            );
        }
        
        function RuntimeCard({ runtime }) {
            if (!runtime) return <div className="card">Loading...</div>;
            
            return (
                <div className="card">
                    <div className="card-header">
                        <span className="card-title">⚙️ Runtime</span>
                    </div>
                    <div className="metric">
                        <span className="metric-label">Uptime</span>
                        <span className="metric-value uptime">{formatUptime(runtime.uptime)}</span>
                    </div>
                    <div className="metric">
                        <span className="metric-label">VM Name</span>
                        <span className="metric-value" style={{ fontSize: '0.85rem' }}>{runtime.vmName}</span>
                    </div>
                    <div className="metric">
                        <span className="metric-label">VM Vendor</span>
                        <span className="metric-value" style={{ fontSize: '0.85rem' }}>{runtime.vmVendor}</span>
                    </div>
                    <div className="metric">
                        <span className="metric-label">VM Version</span>
                        <span className="metric-value">{runtime.vmVersion}</span>
                    </div>
                    <div className="metric">
                        <span className="metric-label">PID</span>
                        <span className="metric-value">-</span>
                    </div>
                </div>
            );
        }
        
        function GCCard({ gc }) {
            if (!gc) return <div className="card">Loading...</div>;
            
            const gcArray = Object.values(gc);
            
            return (
                <div className="card">
                    <div className="card-header">
                        <span className="card-title">♻️ Garbage Collection</span>
                    </div>
                    {gcArray.map((gcInfo, index) => (
                        <div key={index} className="metric">
                            <span className="metric-label" title={gcInfo.name}>
                                {gcInfo.name.replace('G1 ', '').replace('Young ', 'Y ').replace('Old ', 'O ')}
                            </span>
                            <span className="metric-value">
                                {gcInfo.count} / {formatUptime(gcInfo.time)}
                            </span>
                        </div>
                    ))}
                </div>
            );
        }
        
        function App() {
            const [metrics, setMetrics] = useState(null);
            const [connected, setConnected] = useState(false);
            const wsRef = useRef(null);
            
            useEffect(() => {
                connectWebSocket();
                
                return () => {
                    if (wsRef.current) {
                        wsRef.current.close();
                    }
                };
            }, []);
            
            const connectWebSocket = () => {
                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                const hostname = window.location.hostname || 'localhost';
                const port = window.location.port || (protocol === 'wss:' ? '443' : '8080');
                const wsUrl = `${protocol}//${hostname}:${port}/ws/metrics`;
                console.log('Connecting to:', wsUrl);
                
                const ws = new WebSocket(wsUrl);
                wsRef.current = ws;
                
                ws.onopen = () => {
                    console.log('WebSocket connected');
                    setConnected(true);
                };
                
                ws.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        setMetrics(data);
                    } catch (e) {
                        console.error('Error parsing metrics:', e);
                    }
                };
                
                ws.onerror = (error) => {
                    console.error('WebSocket error:', error);
                };
                
                ws.onclose = () => {
                    console.log('WebSocket disconnected');
                    setConnected(false);
                    // Reconnect after 3 seconds
                    setTimeout(() => {
                        if (!wsRef.current || wsRef.current.readyState === WebSocket.CLOSED) {
                            connectWebSocket();
                        }
                    }, 3000);
                };
            };
            
            if (!metrics) {
                return (
                    <div className="container">
                        <header>
                            <h1>🔍 Cognivex Metrics</h1>
                            <div className="loading">
                                <div className="spinner"></div>
                                <p>Connecting to metrics stream...</p>
                            </div>
                        </header>
                    </div>
                );
            }
            
            return (
                <div className="container">
                    <header>
                        <h1>🔍 Cognivex Metrics</h1>
                        <div className={`status ${connected ? 'connected' : 'disconnected'}`}>
                            <span className="status-dot"></span>
                            {connected ? 'Live' : 'Disconnected'}
                        </div>
                        <div className="timestamp">
                            Last update: {metrics.timestamp}
                        </div>
                    </header>
                    
                    <div className="grid">
                        <MemoryCard memory={metrics.memory} />
                        <ThreadCard threads={metrics.threads} />
                        <RuntimeCard runtime={metrics.runtime} />
                        <GCCard gc={metrics.gc} />
                    </div>
                </div>
            );
        }
        
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
